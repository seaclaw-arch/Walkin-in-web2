        // Debounced version
        const debouncedSearch = Utils.debounce(performSearch, CONFIG.searchDebounceMs);
        
        function performSearch() {
    const query = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
    const resultsContainer = document.getElementById('searchResults');
    const statusFilter = document.getElementById('searchStatus')?.value || '';
    const dateFrom = document.getElementById('searchDateFrom')?.value;
    const dateTo = document.getElementById('searchDateTo')?.value;
    
    const isBasketStatus = ['aktif','expired','est-lewat','retain'].includes(statusFilter);
    const isTxnFilter = ['masuk', 'keluar', 'pindah'].includes(statusFilter);
    
    // ✅ Izinkan query kosong jika filter status keranjang aktif
    if (!query && !isBasketStatus && !isTxnFilter) {
        resultsContainer.innerHTML = '<div class="empty-state">Ketik minimal 2 karakter atau pilih filter status</div>';
        return;
    }
    if (isTxnFilter && (!query || query.length < 2)) {
        resultsContainer.innerHTML = '<div class="empty-state">Ketik minimal 2 karakter untuk riwayat transaksi</div>';
        return;
    }
    
    const results = [];
    if (isTxnFilter) {
        currentTransactions().forEach(txn => {
            const matchesType = 
                (statusFilter === 'masuk' && txn.type === 'in') ||
                (statusFilter === 'keluar' && txn.type === 'out') ||
                (statusFilter === 'pindah' && txn.type === 'move');
            if (matchesType && txn.detail?.nama?.toLowerCase().includes(query)) {
                results.push({ type: 'transaction', transactionType: txn.type, area: 'history', item: txn.detail, timestamp: txn.timestamp, user: txn.user, detail: txn.detail });
            }
        });
    } else {
        collectSearchResults('frozen', query, results);
        collectSearchResults('chiller', query, results);
    }
    
    let filtered = results;
    if (!isTxnFilter) {
        if (statusFilter === 'expired') {
            filtered = filtered.filter(r => r.item.expDate && Utils.isDateExpired(r.item.expDate));
        } else if (statusFilter === 'est-lewat') {
            filtered = filtered.filter(r => r.item.estOutDate && Utils.isDateExpired(r.item.estOutDate));
        } else if (statusFilter === 'aktif') {
            filtered = filtered.filter(r => 
                (!r.item.expDate || !Utils.isDateExpired(r.item.expDate)) &&
                (!r.item.estOutDate || !Utils.isDateExpired(r.item.estOutDate)) &&
                !r.item.isRetainSample
            );
        } else if (statusFilter === 'retain') {
            filtered = filtered.filter(r => r.item.isRetainSample === true);
        }
    }
    
    if (dateFrom) filtered = filtered.filter(r => r.item.expDate && Utils.parseDate(r.item.expDate) >= Utils.parseDate(dateFrom));
    if (dateTo) filtered = filtered.filter(r => r.item.expDate && Utils.parseDate(r.item.expDate) <= Utils.parseDate(dateTo));
    
    if (filtered.length === 0) {
        resultsContainer.innerHTML = `<div class="empty-state">Tidak ditemukan "${Utils.escapeHtml(query || statusFilter)}"</div>`;
        return;
    }
    
    let html = `<div class="search-stats" role="status"><div class="search-stat"><div class="count">${filtered.length}</div><div class="label">Ditemukan</div></div></div>`;
    
    filtered.forEach(r => {
        let owner = r.item.addedBy || r.user;
        if (!owner || ['unknown','Tidak diketahui'].includes(owner)) owner = findItemOwner(r.item.nama, r.detail?.keranjang || r.keranjangNo, r.area || 'frozen', r.item.tglMasuk) || 'Tidak diketahui';
        const ownerDisplay = owner ? owner.split('@')[0] : 'Tidak diketahui';
        
        let iconHtml = '', badgeClass = '', badgeText = '';
        if (r.type === 'transaction') {
            if (r.transactionType === 'masuk') { iconHtml = '<i class="fas fa-arrow-down" style="color:#10b981" aria-hidden="true"></i>'; badgeClass = 'status-masuk'; badgeText = 'Masuk'; }
            else if (r.transactionType === 'keluar') { iconHtml = '<i class="fas fa-arrow-up" style="color:#ef4444" aria-hidden="true"></i>'; badgeClass = 'status-keluar'; badgeText = 'Keluar'; }
            else { iconHtml = '<i class="fas fa-exchange-alt" style="color:#8b5cf6" aria-hidden="true"></i>'; badgeClass = 'status-pindah'; badgeText = 'Pindah'; }
        } else {
            if (r.item.isRetainSample) {
                iconHtml = '<i class="fas fa-vial" style="color:#7c3aed" aria-hidden="true"></i>';
                badgeClass = 'status-pindah'; badgeText = 'Retain';
            } else if (r.item.expDate && Utils.isDateExpired(r.item.expDate)) {
                iconHtml = '<i class="fas fa-skull" style="color:#ef4444" aria-hidden="true"></i>'; badgeClass = 'status-expired'; badgeText = 'Expired';
            } else if (r.item.estOutDate && Utils.isDateExpired(r.item.estOutDate)) {
                iconHtml = '<i class="fas fa-hourglass-end" style="color:#f97316" aria-hidden="true"></i>'; badgeClass = 'status-est-lewat'; badgeText = 'Est. Lewat';
            } else {
                iconHtml = '<i class="fas fa-circle" style="color:#10b981" aria-hidden="true"></i>'; badgeClass = 'status-aktif'; badgeText = 'Aktif';
            }
        }
        
        const dateStr = r.timestamp ? new Date(r.timestamp).toLocaleDateString('id-ID') : '-';
        let locStr = '';
        if (r.type !== 'transaction') {
            locStr = `<div style="margin-top:4px;font-size:0.8rem;color:#64748b;">📍 <strong>${Utils.escapeHtml(r.section)} ${String(r.keranjangNo).padStart(2,'0')}</strong> ${r.area==='frozen'?'(Frozen)':'(Chiller)'}</div>`;
        } else {
            locStr = `<div style="margin-top:4px;font-size:0.8rem;color:#64748b;">📅 ${dateStr} | 👤 ${Utils.escapeHtml(ownerDisplay)}</div>`;
            if (r.detail?.dari && r.detail?.ke) locStr += `<div style="font-size:0.75rem;color:#8b5cf6;">🔄 ${Utils.escapeHtml(r.detail.dari)} → ${Utils.escapeHtml(r.detail.ke)}</div>`;
        }
        
        const itemClass = r.type === 'transaction' ? (r.transactionType==='out'?'out':'') : (r.item.expDate && Utils.isDateExpired(r.item.expDate) ? 'expired' : '');
        
        html += `
            <div class="search-result-item ${itemClass}" onclick="${r.type !== 'transaction' ? `App.navigateToBasket(${r.keranjangNo},'${r.area}')` : ''}" role="listitem" tabindex="0">
                <div class="search-result-header">
                    <div><span class="status-badge ${badgeClass}">${iconHtml} ${badgeText}</span> ${r.type !== 'transaction' ? `<span class="area-badge ${r.area==='frozen'?'area-frozen':'area-chiller'}">${r.area==='frozen'?'❄️':'🌡️'}</span>` : ''}</div>
                    <div><small>${Utils.escapeHtml(r.item.jenis||'-')}</small></div>
                </div>
                <div><strong>${highlightText(r.item.nama, query)}</strong> <span style="color:#64748b;">Qty: ${Utils.escapeHtml(r.item.qty)}</span></div>
                ${locStr}
                ${r.type !== 'transaction' ? `<div style="margin-top:6px;"><button class="btn btn-sm btn-outline" onclick="App.navigateToBasket(${r.keranjangNo},'${r.area}')" aria-label="Lihat keranjang ${r.keranjangNo}">Lihat Keranjang</button></div>` : ''}
            </div>
        `;
    });
    
    resultsContainer.innerHTML = html;
}
        
        function collectSearchResults(area, query, results) {
            const baskets = state.appData[area].baskets;
            for (const [basketNum, basket] of Object.entries(baskets)) {
                if (basket.items?.length) {
                    basket.items.forEach(item => {
                        if (item.nama?.toLowerCase().includes(query)) {
                            results.push({
                                area,
                                status: 'current',
                                item,
                                keranjangNo: parseInt(basketNum),
                                section: basket.section,
                                baris: basket.baris,
                                slot: basket.slot
                            });
                        }
                    });
                }
            }
        }
        
        function highlightText(text, query) {
            if (!text || !query) return Utils.escapeHtml(text);
            const escaped = text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escaped.replace(regex, '<span class="search-highlight">$1</span>');
        }

                    if (!monthly[m].bySection[sec]) monthly[m].bySection[sec] = { in: 0, out: 0 };

                const yearOptions = years.map(y => `<option value="${y}" ${y===selectedYear?'selected':''}>${y}</option>`).join('')

                                        <th>Bulan</th><th>Masuk</th><th>Keluar</th><th>Selisih</th><th>Per Section</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            } else {
                // Tahunan mode
                const yearly = {};
                transactions.forEach(t => {
                    const y = new Date(t.timestamp).getFullYear();
                    if (!yearly[y]) yearly[y] = { in: 0, out: 0, bySection: {} };
                    yearly[y][t.type]++;
                    const sec = t.detail.section || '-';
                    if (!yearly[y].bySection[sec]) yearly[y].bySection[sec] = { in: 0, out: 0 };
                    yearly[y].bySection[sec][t.type]++;
                });
                
                let rows = '';
                [...Object.keys(yearly)].sort((a,b) => b-a).forEach(y => {
                    const data = yearly[y];
                    const badges = Object.entries(data.bySection)
                        .map(([s, v]) => `<span class="section-badge">${Utils.escapeHtml(s)}: +${v.in} -${v.out}</span>`)
                        .join('');
                    rows += `

        function downloadRekapExcel() {
            const txns = currentTransactions();
            if (!txns.length) return showToast('Tidak ada data untuk diexport', 'critical');
            
            const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            const grouped = {};
            
            txns.forEach(t => {
                const d = new Date(t.timestamp);
                const key = state.rekapMode === 'bulanan' 
                    ? `${BULAN[d.getMonth()]} ${d.getFullYear()}` 
                    : `${d.getFullYear()}`;
                if (!grouped[key]) grouped[key] = { in: 0, out: 0 };
                grouped[key][t.type]++;
            });
            
            let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="UTF-8"></head><body><h2>Rekap — ${state.currentArea.toUpperCase()}</h2><table border="1"><tr style="background:#2563eb;color:white;"><th>Periode</th><th>Masuk</th><th>Keluar</th><th>Selisih</th></tr>`;
            
            Object.entries(grouped).forEach(([period, data]) => {
                html += `<tr><td>${Utils.escapeHtml(period)}</td><td>+${data.in}</td><td>-${data.out}</td><td>${data.in - data.out >= 0 ? '+' : ''}${data.in - data.out}</td></tr>`;
            });
            html += '</table></body></html>';
            downloadBlob(html, `rekap_${state.currentArea}_${new Date().toISOString().split('T')[0]}.xls`);
        }
        
        function downloadBlob(html, filename) {
            const blob = new Blob([html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            URL.revokeObjectURL(link.href);
        }
        
        // ==================== HELPER FUNCTIONS ====================
        function findItemOwner(itemName, basketNum, area, tglMasuk) {
            const txns = state.appData[area].transactions;
            
            // Try exact match first
            let match = txns.find(t => 
                t.type === 'in' && 
                t.detail?.nama === itemName && 
                t.detail?.keranjang === basketNum && 
                t.detail?.tglMasuk === tglMasuk && 
                t.user && !['unknown', 'Tidak diketahui'].includes(t.user)
            );
            
            if (!match) {
                // Fallback: match by name + basket
                match = txns.find(t => 
                    t.type === 'in' && 
                    t.detail?.nama === itemName && 
                    t.detail?.keranjang === basketNum && 
                    t.user && !['unknown', 'Tidak diketahui'].includes(t.user)
                );
            }
            
            if (!match) {
                // Last resort: match by name only
                match = txns.find(t => 
                    t.type === 'in' && 
                    t.detail?.nama === itemName && 
                    t.user && !['unknown', 'Tidak diketahui'].includes(t.user)
                );
            }
            
            return match?.user || null;
        }

        function copyToClipboard(text) {
            if (navigator.clipboard?.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => console.log('✅ Copied'))
                    .catch(err => {
                        console.error('Clipboard error:', err);
                        fallbackCopy(text);
                    });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('✅ Teks dicopy!');
            } catch {
                showToast('❌ Gagal copy. Silakan copy manual.');
            }
            document.body.removeChild(textarea);
        }

                                    <input type="number" id="inp_${sectionName}_${barisName}_${i}" 
                                           placeholder="No" style="width:80px;padding:4px;" 
                                           aria-label="Nomor keranjang untuk slot ${i+1}">
                                    <button class="btn btn-sm btn-primary" 
                                            onclick="App.fillSlot('${sectionName}','${barisName}',${i})"
                                            aria-label="Isi slot ${i+1} dengan nomor keranjang">
                                        Isi
                                    </button>
                                </div>
                            `;
                        }
                    }
                    html += '</div>';
                }
                html += `<div><button class="btn btn-sm btn-outline" onclick="App.addBaris('${sectionName}')">➕ Tambah Baris Baru</button></div></div>`;
            }
            html += '</div>';
            DOM.container.innerHTML = html;
        }
        
        function clearSlot(section, baris, slotIdx) {
            if (!isAdmin()) return;
            const slots = currentSections()[section]?.[baris];
            if (!slots?.[slotIdx]) return;
            
            const basketNum = slots[slotIdx];
            if (confirm(`Hapus keranjang ${basketNum} dari Slot ${slotIdx+1}?`)) {
                slots[slotIdx] = null;
                saveToFirestore().catch(() => {});
                showToast('Slot dikosongkan.');
                renderManageBaskets();
            }
        }
        
        function fillSlot(section, baris, slotIdx) {
            if (!isAdmin()) return;
            const input = document.getElementById(`inp_${section}_${baris}_${slotIdx}`);
            const value = parseInt(input?.value);
            if (!value) return showToast('Masukkan nomor keranjang.', 'critical');
            
            // Check uniqueness
            for (const [secName, barisObj] of Object.entries(currentSections())) {
                for (const slots of Object.values(barisObj)) {
                    if (slots.includes(value)) {
                        return showToast(`Nomor ${value} sudah digunakan di ${secName}.`, 'critical');
                    }
                }
            }
            
            currentSections()[section][baris][slotIdx] = value;
            saveToFirestore().catch(() => {});
            showToast('Slot diisi.');
            renderManageBaskets();
        }
        
        function addBaris(sectionName) {
            if (!isAdmin()) return;
            const sections = currentSections();
            const barisObj = sections[sectionName];
            const nextChar = String.fromCharCode(65 + Object.keys(barisObj).length);
            barisObj[nextChar] = [null, null, null, null, null];
            saveToFirestore().catch(() => {});
            showToast(`Baris ${nextChar} ditambahkan.`);
            renderManageBaskets();
        }
        
        async function migrateOldItemsAddedBy() {
            if (!isAdmin()) {
                showToast('⚠️ Hanya admin yang bisa menjalankan migrasi', 'critical');
                return;
            }
            if (!confirm('🔄 Perbaiki data "addedBy" untuk item lama?')) return;
            
            let updated = 0;
            for (const area of ['frozen', 'chiller']) {
                const baskets = state.appData[area].baskets;
                const txns = state.appData[area].transactions;
                
                for (const [basketNum, basket] of Object.entries(baskets)) {
                    basket.items?.forEach(item => {
                        if (!item.addedBy || ['unknown', 'Tidak diketahui'].includes(item.addedBy)) {
                            const owner = findItemOwner(item.nama, parseInt(basketNum), area, item.tglMasuk);
                            if (owner) {
                                item.addedBy = owner;
                                updated++;
                            }
                        }
                    });
                }
            }
            
            try {
                await saveToFirestore();
                showToast(`✅ Migrasi selesai! ${updated} item diperbarui.`);
                renderCurrentTab();
            } catch {
                // Error handled
            }
        }
        
        function toggleRetainSample(basketNum, itemIdx, isChecked) {
            const basket = currentBaskets()[basketNum];
  if (!basket?.items[itemIdx]) return;
  const currentUser = auth.currentUser?.email || 'unknown';
  basket.items[itemIdx].isRetainSample = isChecked;
  basket.lastModifiedBy = currentUser;
  basket.lastModifiedAt = new Date().toISOString();
            
            logTransaction('edit', {
                nama: basket.items[itemIdx].nama,
                qty: basket.items[itemIdx].qty,
                jenis: basket.items[itemIdx].jenis,
                keranjang: basketNum,
                section: basket.section,
                oldEstOutDate: '-',
                newEstOutDate: isChecked ? 'RETAIN SAMPLE' : 'NORMAL'
            });
            
            saveToFirestore().catch(() => {});
            showToast(isChecked ? '✅ Ditandai sebagai Retain Sample (Abaikan Exp)' : '🔄 Kembali ke status normal');
            showBasketDetail(basketNum, itemIdx);
        }
        
        // ==================== ADMIN FUNCTIONS ====================
        async function resetAllData() {
            if (!isAdmin()) {
                showToast('⚠️ Hanya admin yang dapat mereset data.', 'critical');
                return;
            }
            if (!confirm('⚠️ Hapus SEMUA data? Tindakan ini tidak dapat dibatalkan.')) return;
            if (!confirm('⚠️ Konfirmasi: Data akan hilang permanen. Yakin?')) return;
            
            try {
                await db.collection('shared').doc('data').set({
                    frozen: {
                        sections: getDefaultSections('frozen'),
                        baskets: {},
                        transactions: []
                    },
                    chiller: {
                        sections: getDefaultSections('chiller'),
                        baskets: {},
                        transactions: []
                    }
                });
                showToast('✅ Data direset.');
                renderCurrentTab();
            } catch (err) {
                console.error('Reset error:', err);
                showToast('❌ Gagal mereset data.', 'critical');
            }
        }
        
        // ==================== NAVIGATION ====================
        function switchArea() {
            state.currentArea = DOM.areaSelect.value;
            DOM.areaTitle.textContent = state.currentArea === 'frozen' ? 'Frozen' : 'Chiller';
            renderCurrentTab();
        }
        
        function renderCurrentTab() {
            try {
                switch (state.currentTab) {
                    case 'dashboard': renderDashboard(); break;
                    case 'in': renderInputForm(); break;
                    case 'search': renderSearch(); break;
                    case 'history': renderHistory(); break;
                    case 'rekap': renderRekap(); break;
                    case 'reminder': renderReminder(); break;
                    case 'manage': renderManageBaskets(); break;
                    default: renderDashboard();
                }
            } catch (err) {
                console.error('Render error:', err);
                DOM.container.innerHTML = `
                    <div class="card">
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle" style="color:var(--warning);" aria-hidden="true"></i>
                            <p>Terjadi error. Silakan refresh halaman.</p>
                            <button class="btn btn-sm btn-outline" onclick="location.reload()">Refresh</button>
                        </div>
                    </div>
                `;
            }
        }

        // ==================== SEARCH BRIDGE ====================
    function searchByStatus(status) {
        state.currentTab = 'search';
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.setAttribute('aria-selected', 'false');
        });
        const searchBtn = document.querySelector('.tab-btn[data-tab="search"]');
        if (searchBtn) {
            searchBtn.classList.add('active');
            searchBtn.setAttribute('aria-selected', 'true');
        }
        renderSearch();
        setTimeout(() => {
            const statusSelect = document.getElementById('searchStatus');
            const searchInput = document.getElementById('searchInput');
            if (statusSelect) statusSelect.value = status;
            if (searchInput) searchInput.value = '';
            performSearch();
        }, 100);
    }
        // ==================== INIT ====================
        function init() {
            // Cache DOM elements
            DOM.loginScreen = document.getElementById('loginScreen');
            DOM.appScreen = document.getElementById('appScreen');
            DOM.container = document.getElementById('appContainer');
            DOM.toast = document.getElementById('toast');
            DOM.areaSelect = document.getElementById('areaSelect');
            DOM.areaTitle = document.getElementById('areaTitle');
            DOM.currentUserName = document.getElementById('currentUserName');
            DOM.loginError = document.getElementById('loginError');
            DOM.loginEmail = document.getElementById('loginEmail');
            DOM.loginPassword = document.getElementById('loginPassword');
            
            // Initialize
            initFirebase();
            setupAuthListener();
            
            // Tab navigation with accessibility
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    this.classList.add('active');
                    this.setAttribute('aria-selected', 'true');
                    state.currentTab = this.dataset.tab;
                    renderCurrentTab();
                });
                
                // Keyboard navigation
                btn.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        btn.click();
                    }
                });
            });
            
            // Set initial area
            DOM.areaSelect.value = state.currentArea;
        }
        
        // Expose public API
        return {
            init,
            login,
            loginWithGoogle,
            logout,
            switchArea,
            renderDashboard,
            showBasketDetail,
            quickAddToBasket,
            submitQuickAdd,
            validateQuickEstOut,
            editEstOutDate,
            renderMoveForm,
            updateMoveSectionByArea,
            updateMoveBaris,
            updateMoveKeranjang,
            pindahkanItem,
            validateMoveKeranjangBaru,
            keluarkanItem,
            closePartialOutDialog,
            executePartialOut,
            showMoveBasketForm,
            updateMoveBasketBaris,
            updateMoveBasketSlot,
            executeMoveBasket,
            renderInputForm,
            handleSlotChange,
            validateKeranjangNumber,
            validateEstOutDate,
            updateBarisSelect,
            updateSlotSelect,
            submitIn,
            renderSearch,
            debouncedSearch,
            performSearch,
            navigateToBasket,
            renderHistory,
            downloadExcel,
            renderRekap,
            downloadRekapExcel,
            renderReminder,
            copyUserReminderByKey,
            copyAllReminders,
            exportReminderCSV,
            navigateToBasketFromReminder,
            renderManageBaskets,
            clearSlot,
            fillSlot,
            addBaris,
            migrateOldItemsAddedBy,
            toggleRetainSample,
            searchByStatus,
            resetAllData
        };
    })();
    
    // Start app when DOM ready
    document.addEventListener('DOMContentLoaded', App.init);
    </script>
</body>
