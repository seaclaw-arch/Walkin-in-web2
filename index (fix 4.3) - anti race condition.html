<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Walk-in Frozen & Chiller | v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-primary: #f8fafc; --bg-secondary: #ffffff; --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-hover: #2563eb; --primary-light: #dbeafe;
            --success: #10b981; --success-light: #d1fae5; --warning: #f59e0b; --warning-light: #fef3c7;
            --danger: #ef4444; --danger-light: #fee2e2; --purple: #8b5cf6; --purple-light: #ede9fe;
            --orange: #f97316; --orange-light: #ffedd5; --border: #e2e8f0; --border-focus: #3b82f6;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-glow: 0 0 0 3px rgb(59 130 246 / 0.15);
            --radius: 16px; --radius-sm: 12px; --radius-lg: 24px;
            --transition: all 0.2s ease; --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --toast-z: 200; --basket-num-z: 10;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; line-height: 1.5; -webkit-font-smoothing: antialiased; }
        
        /* Header & Navigation */
        .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); width: 100%; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; gap: 12px; flex-wrap: wrap; box-shadow: var(--shadow); }
        .header h2 { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.025em; display: flex; align-items: center; gap: 6px; }
        .area-selector { display: flex; align-items: center; gap: 8px; }
        .area-selector select { padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-weight: 500; font-size: 0.85rem; cursor: pointer; transition: var(--transition); }
        .area-selector select:hover, .area-selector select:focus { background: rgba(255,255,255,0.2); outline: none; border-color: rgba(255,255,255,0.4); }
        .area-selector select option { background: var(--bg-secondary); color: var(--text-primary); }
        .user-row { display: flex; align-items: center; gap: 8px; }
        .user-row span { font-size: 0.8rem; color: rgba(255,255,255,0.9); font-weight: 500; }
        
        .tab-bar { display: flex; width: 100%; background: var(--bg-secondary); padding: 8px 12px; gap: 4px; overflow-x: auto; box-shadow: var(--shadow-sm); position: sticky; top: 60px; z-index: 90; scrollbar-width: none; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn { flex: 1 0 auto; padding: 10px 16px; border: none; background: transparent; font-weight: 500; color: var(--text-secondary); border-radius: 10px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; transition: var(--transition); position: relative; }
        .tab-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .tab-btn.active { background: var(--primary); color: white; font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--primary); border-radius: 2px; }
        
        .container { width: 100%; max-width: 720px; padding: 16px; display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
        .card { background: var(--bg-secondary); border-radius: var(--radius); padding: 20px 18px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition-smooth); }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        
        /* Form Elements */
        .form-group { margin-bottom: 16px; }
        label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 6px; color: var(--text-primary); letter-spacing: 0.025em; }
        input, select { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; background: var(--bg-secondary); color: var(--text-primary); transition: var(--transition); }
        input:focus, select:focus { outline: none; border-color: var(--border-focus); box-shadow: var(--shadow-glow); background: var(--bg-primary); }
        input::placeholder { color: var(--text-muted); }
        
        /* Buttons */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.9rem; transition: var(--transition); letter-spacing: -0.01em; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgb(59 130 246 / 0.4); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; box-shadow: 0 4px 12px rgb(239 68 68 / 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-tertiary); border-color: var(--text-muted); }
        .btn-sm { padding: 8px 14px; font-size: 0.8rem; border-radius: 10px; }
        .btn-quick { padding: 5px 10px; font-size: 0.75rem; background: var(--primary-light); color: var(--primary); border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; margin-top: 6px; transition: var(--transition); font-weight: 500; }
        .btn-quick:hover { background: var(--primary); color: white; }
        .google-btn { background: white; color: var(--text-primary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: 500; margin-top: 12px; width: 100%; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .google-btn:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: var(--text-muted); }
        .google-btn i { font-size: 1.1rem; }
        
        /* Item Rows & Lists */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--bg-tertiary); border-radius: 12px; margin-bottom: 8px; transition: var(--transition); border: 1px solid transparent; }
        .item-row:hover { background: var(--bg-secondary); border-color: var(--border); box-shadow: var(--shadow-sm); }
        .item-row.expired { background: var(--danger-light); border-color: var(--danger); }
        .item-row.expired:hover { background: #fecaca; }
        .empty-state { color: var(--text-muted); text-align: center; padding: 32px 20px; font-size: 0.9rem; }
        .empty-state i { font-size: 2rem; margin-bottom: 12px; opacity: 0.6; display: block; }
        
        /* Toast Notification - FIXED POSITION & Z-INDEX */
        .toast { 
            position: fixed; 
            bottom: 80px; /* ↑ Naikkan agar tidak menutupi basket numbers */
            left: 50%; 
            transform: translateX(-50%) translateY(20px); 
            background: var(--text-primary); 
            color: white; 
            padding: 14px 24px; 
            border-radius: 14px; 
            text-align: center; 
            opacity: 0; 
            transition: var(--transition-smooth); 
            z-index: var(--toast-z); 
            font-weight: 500; 
            box-shadow: var(--shadow-lg); 
            max-width: 90%; 
            pointer-events: none; /* Agar tidak blocking click */
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.critical { background: var(--danger); animation: pulse-danger 1s infinite; }
        
        /* Chips & Badges */
        .chip { background: var(--bg-tertiary); border-radius: 100px; padding: 5px 12px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 5px; margin: 2px; font-weight: 500; color: var(--text-secondary); }
        .baris-label { font-size: 0.75rem; font-weight: 700; color: var(--text-primary); margin: 12px 0 6px 0; background: var(--primary-light); color: var(--primary); display: inline-block; padding: 4px 12px; border-radius: 100px; }
        .section-badge { background: var(--primary-light); color: var(--primary); border-radius: 100px; padding: 3px 10px; font-size: 0.7rem; font-weight: 600; margin: 2px; display: inline-block; }
        .area-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 600; }
        .area-frozen { background: var(--primary-light); color: var(--primary); }
        .area-chiller { background: var(--success-light); color: var(--success); }
        
        /* Status Badges - Colorblind Safe */
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; }
        .status-aktif { background: var(--success-light); color: var(--success); }
        .status-expired { background: var(--danger-light); color: var(--danger); }
        .status-est-lewat { background: var(--orange-light); color: var(--orange); }
        .status-masuk { background: var(--success-light); color: var(--success); }
        .status-keluar { background: var(--danger-light); color: var(--danger); }
        .status-pindah { background: var(--purple-light); color: var(--purple); }
        
        /* Rekap & Stats */
        .rekap-tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--bg-tertiary); padding: 4px; border-radius: 12px; width: fit-content; }
        .rekap-tab { padding: 8px 18px; border-radius: 10px; border: none; background: transparent; font-weight: 500; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary); transition: var(--transition); }
        .rekap-tab:hover { color: var(--text-primary); }
        .rekap-tab.active { background: var(--bg-secondary); color: var(--primary); font-weight: 600; box-shadow: var(--shadow-sm); }
        .rekap-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.85rem; background: var(--bg-secondary); border-radius: 12px; overflow: hidden; }
        .rekap-table th { background: var(--text-primary); color: white; padding: 12px 10px; text-align: left; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.025em; }
        .rekap-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
        .rekap-table tr:last-child td { border-bottom: none; }
        .rekap-table tr:hover td { background: var(--bg-tertiary); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .stat-box { background: var(--bg-secondary); border-radius: 16px; padding: 16px; text-align: center; border: 1px solid var(--border); transition: var(--transition); }
        .stat-box:hover { border-color: var(--primary); box-shadow: var(--shadow-glow); }
        .stat-box .val { font-size: 1.8rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .stat-box .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
        .stat-box.out .val { color: var(--danger); }
        .stat-box.out { background: var(--danger-light); border-color: transparent; }
        
        /* Search */
        .search-container { background: var(--bg-secondary); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .search-input-wrapper { position: relative; margin-bottom: 16px; }
        .search-input-wrapper input { padding-right: 48px; font-size: 1rem; }
        .search-input-wrapper .search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 1.1rem; transition: var(--transition); }
        .search-input-wrapper .search-icon:hover { color: var(--primary); }
        .search-result-item { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; transition: var(--transition); cursor: pointer; }
        .search-result-item:hover { border-color: var(--primary); box-shadow: var(--shadow-glow); background: var(--bg-secondary); }
        .search-result-item.current { border-left: 4px solid var(--success); background: var(--success-light); }
        .search-result-item.out { border-left: 4px solid var(--danger); background: var(--danger-light); opacity: 0.95; }
        .search-result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .search-highlight { background: var(--warning-light); color: var(--warning); padding: 1px 4px; border-radius: 4px; font-weight: 600; }
        .search-stats { display: flex; gap: 12px; margin-bottom: 16px; padding: 12px; background: var(--primary-light); border-radius: 12px; }
        .search-stat { text-align: center; flex: 1; }
        .search-stat .count { font-size: 1.4rem; font-weight: 800; color: var(--primary); line-height: 1; }
        .search-stat .label { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; font-weight: 500; }
        
        /* Floor Plan - FIXED MOBILE LABELS */
        .fp-room { border: 2px solid var(--text-primary); border-radius: 12px; padding: 12px; overflow-x: auto; background: var(--bg-secondary); -webkit-overflow-scrolling: touch; }
        .fp-room-title { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 12px; text-align: center; padding: 8px; background: var(--bg-tertiary); border-radius: 10px; }
        .fp-legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 12px 4px; font-size: 0.75rem; font-weight: 500; margin-top: 14px; color: var(--text-secondary); }
        .fp-legend span { display: flex; align-items: center; gap: 5px; }
        
        .baris-box { 
            width: 110px; 
            height: 180px; /* ↑ Lebih tinggi untuk label */
            background: linear-gradient(145deg, #fef3c7, #fde68a); 
            border: 2px solid #d97706; 
            border-radius: 12px; 
            padding: 6px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: var(--transition); 
        }
        .baris-box:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        
        /* FIXED: Baris label visible on mobile */
        .baris-box-lbl { 
            font-size: 0.7rem; /* ↑ Lebih besar */
            font-weight: 700; 
            color: #92400e; 
            text-align: center; 
            line-height: 1.3; 
            margin-bottom: 6px; /* ↑ Jarak lebih */
            white-space: nowrap; 
            overflow: visible; /* ↑ Jangan dipotong */
            text-overflow: clip; /* ↑ Jangan ellipsis */
            background: rgba(255,255,255,0.7);
            padding: 2px 4px;
            border-radius: 4px;
        }
        
        .baris-slots { display: flex; flex-direction: column-reverse; gap: 3px; flex: 1; min-height: 0; }
        
        /* FIXED: Basket Number - Left Position + Background Badge */
        .basket-slot { 
            flex: 1; 
            min-height: 0; 
            border-radius: 8px; 
            background: var(--bg-secondary); 
            border: 1.5px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; /* ← Align ke kiri */
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            transition: var(--transition); 
            overflow: hidden; 
            font-weight: 600; 
            padding: 4px 6px; /* ↑ Space untuk badge */
        }
        .basket-slot:hover { border-color: var(--primary); transform: scale(1.02); }
        .basket-slot:active { transform: scale(0.98); }
        .basket-slot.green { border-color: var(--success); background: var(--success-light); }
        .basket-slot.yellow { border-color: var(--warning); background: var(--warning-light); animation: pulse-warning 2s infinite; }
        .basket-slot.red { border-color: var(--danger); background: var(--danger-light); animation: pulse-danger 1s infinite; }
        .basket-slot.slot-empty { background: var(--bg-tertiary); border: 1.5px dashed var(--border); cursor: default; }
        .basket-slot.slot-empty:hover { border-color: var(--text-muted); transform: none; }
        
        /* FIXED: Basket number badge style */
        .basket-num-badge {
            position: absolute;
            left: 6px; /* ← Kiri */
            top: 4px;
            background: var(--primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
            z-index: var(--basket-num-z);
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.2);
            min-width: 28px;
            text-align: center;
        }
        .basket-slot.green .basket-num-badge { background: var(--success); }
        .basket-slot.yellow .basket-num-badge { background: var(--warning); color: #000; }
        .basket-slot.red .basket-num-badge { background: var(--danger); }
        .basket-slot.slot-empty .basket-num-badge { display: none; }
        
        .slot-count { 
            font-size: 0.6rem; 
            color: var(--text-muted); 
            font-weight: 500; 
            margin-top: auto; 
            margin-left: auto; /* → Kanan bawah */
            background: rgba(255,255,255,0.9);
            padding: 1px 6px;
            border-radius: 4px;
        }
        
        .baris-box.stock-box { background: linear-gradient(145deg, #e0e7ff, #c7d2fe); border-color: #6366f1; justify-content: center; align-items: center; gap: 6px; }
        .baris-box.stock-box .baris-box-lbl { color: #4338ca; font-size: 0.6rem; white-space: normal; text-align: center; line-height: 1.3; margin: 0; }
        .stock-icon { font-size: 1.5rem; }
        .spacer, .spacer-box { min-height: 40px; background: var(--bg-tertiary); border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; }
        .spacer-box { width: 110px; height: 180px; flex-shrink: 0; }
        
        /* Chiller Plan */
        .chl-plan { display: flex; flex-direction: column; gap: 10px; min-width: 800px; }
        .chl-top { display: flex; gap: 10px; align-items: flex-start; }
        .chl-space { min-height: 70px; background: var(--bg-tertiary); border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; }
        .chl-bot { display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* Move Form - FIXED DROPDOWNS */
        .move-form { 
            background: var(--bg-tertiary); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 12px; 
            margin-top: 8px; 
            display: flex; 
            flex-direction: column; /* ← Stack vertically */
            gap: 10px; 
            align-items: stretch; 
        }
        .move-form select { 
            width: 100%; 
            padding: 10px 12px; 
            font-size: 0.85rem; 
            border-radius: 10px; 
        }
        .move-form .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .move-form .form-row > * { flex: 1; min-width: 120px; }
        
        /* History */
        .history-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem; background: var(--bg-tertiary); border-left: 4px solid var(--border); transition: var(--transition); }
        .history-item:hover { background: var(--bg-secondary); box-shadow: var(--shadow-sm); }
        .history-item.type-in { background: var(--success-light); border-left-color: var(--success); }
        .history-item.type-out { background: var(--danger-light); border-left-color: var(--danger); }
        .history-item.type-move { background: var(--purple-light); border-left-color: var(--purple); }
        .history-item.type-edit { background: var(--warning-light); border-left-color: var(--warning); }
        .history-badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 100px; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.5px; text-transform: uppercase; }
        .badge-in { background: var(--success); color: white; }
        .badge-out { background: var(--danger); color: white; }
        .badge-move { background: var(--purple); color: white; }
        .badge-edit { background: var(--warning); color: white; }
        
        /* Filters & Actions */
        .filter-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
        .filter-row select { width: auto; padding: 10px 14px; font-size: 0.85rem; border-radius: 10px; }
        .reset-btn { background: var(--danger-light); color: var(--danger); border: 2px solid var(--danger); padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; margin-top: 20px; width: 100%; transition: var(--transition); }
        .reset-btn:hover { background: var(--danger); color: white; }
        .input-warning { border-color: var(--danger) !important; background: var(--danger-light) !important; animation: shake 0.4s ease-in-out; }
        .input-success { border-color: var(--success) !important; background: var(--success-light) !important; }
        .warning-message { color: var(--danger); font-size: 0.75rem; margin-top: 5px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .success-message { color: var(--success); font-size: 0.75rem; margin-top: 5px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        
        /* Action Buttons */
        .item-actions { display: flex; gap: 5px; align-items: center; }
        .action-btn { 
            width: 34px; 
            height: 34px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--bg-secondary); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: var(--transition); 
            position: relative; 
            color: var(--text-secondary);
            /* ↑ Pastikan tooltip tidak terpotong */
        }
        .action-btn:hover { transform: scale(1.08); box-shadow: var(--shadow); border-color: var(--primary); color: var(--primary); }
        .action-btn.move-btn { color: var(--purple); }
        .action-btn.move-btn:hover { background: var(--purple-light); border-color: var(--purple); color: var(--purple); }
        .action-btn.edit-btn { color: var(--warning); }
        .action-btn.edit-btn:hover { background: var(--warning-light); border-color: var(--warning); color: var(--warning); }
        .action-btn.out-btn { color: var(--danger); }

<body>
    <div id="loginScreen" class="container" style="max-width:400px;margin-top:40px;">

    <script>
    /**
     * Walk-in Frozen & Chiller v2.1
     * Refactored with: Security hardening, mobile UX fixes, consistent dropdowns
     * Module pattern to avoid global pollution
     */
    const App = (function() {
        'use strict';
        
        // ==================== CONFIG ====================
        const CONFIG = {
            firebase: {
                apiKey: "AIzaSyA1K3kQ93LSz1yKpBa2cMCRD045alTm6cs",
                authDomain: "walk-in-web.firebaseapp.com",
                projectId: "walk-in-web",
                storageBucket: "walk-in-web.firebasestorage.app",
                messagingSenderId: "42449089338",
                appId: "1:42449089338:web:a34b589a7c746b8dcc1603"
            },
            basketCapacity: { DEFAULT: 5, MIXED_WITH_TH: 3, TH_ONLY: 3 },
            maxTransactions: 500,
            searchDebounceMs: 300,
            toastDuration: { normal: 2500, critical: 5000 },
            adminEmails: ['slardar.men@gmail.com']
        };
        
        // ==================== STATE ====================
        let state = {
              currentArea: 'frozen',
  appData: {
    frozen: { sections: {}, baskets: {}, transactions: [] },
    chiller: { sections: {}, baskets: {}, transactions: [] }
  },
  currentTab: 'dashboard',
  rekapMode: 'bulanan',
  unsubscribe: null,
  searchTimer: null,
  isSaving: false
};
        
        // DOM References
        const DOM = {
            loginScreen: null,
            appScreen: null,
            container: null,
            toast: null,
            areaSelect: null,
            areaTitle: null,
            currentUserName: null,
            loginError: null
        };
        
        // ==================== UTILS ====================
        const Utils = {
            // ✅ Sanitize user input to prevent XSS
            escapeHtml: (str) => {
                if (typeof str !== 'string') return str;
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            },
            
            // ✅ Timezone-safe date comparison (YYYY-MM-DD only)
            parseDate: (dateStr) => {
                if (!dateStr) return null;
                const [y, m, d] = dateStr.split('-').map(Number);
                return new Date(y, (m || 1) - 1, d || 1); // Noon UTC to avoid timezone issues
            },
            
            isDateExpired: (dateStr) => {
                const date = Utils.parseDate(dateStr);
                if (!date) return false;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                return date < today;
            },
            
            debounce: (func, wait) => {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            },
            
            // ✅ Safe JSON parse with fallback
            safeJsonParse: (str, fallback) => {
                try { return JSON.parse(str); }
                catch { return fallback; }
            },
            
            // ✅ Generate unique ID
            uid: () => Date.now().toString(36) + Math.random().toString(36).substr(2)
        };
        
        // ==================== FIREBASE ====================
        let auth, db;
        
        function initFirebase() {
            firebase.initializeApp(CONFIG.firebase);
            auth = firebase.auth();
            db = firebase.firestore();
            
            // ✅ Enable offline persistence
            db.enablePersistence().catch(err => {
                if (err.code === 'failed-precondition') {
                    console.warn('Offline persistence only supported in one tab');
                } else if (err.code === 'unimplemented') {
                    console.warn('Offline persistence not available in this browser');
                }
            });
        }
        
        // ==================== AUTH ====================
        function login() {
            const email = DOM.loginEmail?.value.trim();
            const password = DOM.loginPassword?.value.trim();
            
            if (!email || !password) {
                showToast('Isi email dan password.', 'critical');
                return;
            }
            
            DOM.loginError.textContent = '';
            auth.signInWithEmailAndPassword(email, password)
                .catch(err => {
                    console.error('Login error:', err);
                    DOM.loginError.textContent = 'Gagal: ' + (err.message || 'Unknown error');
                });
        }
        
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            auth.signInWithPopup(provider)
                .catch(err => {
                    console.error('Google login error:', err);
                    showToast('Google login gagal: ' + err.message, 'critical');
                });
        }
        
        function logout() {
            auth.signOut().catch(console.error);
        }
        
        // ✅ Hardened admin check - should be validated server-side too
        function isAdmin() {
            const user = auth.currentUser;
            if (!user) return false;
            // Note: This is client-side only; enforce via Firebase Security Rules
            return CONFIG.adminEmails.includes(user.email?.toLowerCase());
        }
        
        function setupAuthListener() {
            auth.onAuthStateChanged(user => {
                if (user) {
                    DOM.loginScreen.style.display = 'none';
                    DOM.appScreen.style.display = 'block';
                    DOM.currentUserName.textContent = user.email;
                    listenToFirestore();
                } else {
                    DOM.loginScreen.style.display = 'block';
                    DOM.appScreen.style.display = 'none';
                    if (state.unsubscribe) state.unsubscribe();
                }
            });
        }
        
        // ==================== FIRESTORE ====================
        function listenToFirestore() {
  if (state.unsubscribe) state.unsubscribe();
  state.unsubscribe = db.collection('shared').doc('data')
    .onSnapshot(doc => {    
      try {
        if (doc.exists) {
          processData(doc.data());
        } else {
          initializeDefaultData();
        }
        renderCurrentTab();
      } catch (err) {
        console.error('Firestore sync error:', err);
        showToast('❌ Gagal sinkronisasi data', 'critical');
      }
    }, err => {
      console.error('Firestore listener error:', err);
      showToast('❌ Koneksi database error', 'critical');
    });
}
        
        function processData(data) {
            let frozen = data.frozen || { sections: getDefaultSections('frozen'), baskets: {}, transactions: [] };
            let chiller = data.chiller || { sections: getDefaultSections('chiller'), baskets: {}, transactions: [] };
            
            // Convert legacy baris format to slots
            frozen.sections = convertSectionsToSlotFormat(frozen.sections || {});
            chiller.sections = convertSectionsToSlotFormat(chiller.sections || {});
            
            state.appData.frozen = frozen;
            state.appData.chiller = chiller;
            
            syncBasketsWithSections('frozen');
            syncBasketsWithSections('chiller');
            
            if (!data.frozen || !data.chiller) {
                saveToFirestore(); // Initialize if missing
            }
        }
        
        function initializeDefaultData() {
            state.appData.frozen = {
                sections: getDefaultSections('frozen'),
                baskets: {},
                transactions: []
            };
            state.appData.chiller = {
                sections: getDefaultSections('chiller'),
                baskets: {},
                transactions: []
            };
            syncBasketsWithSections('frozen');
            syncBasketsWithSections('chiller');
            saveToFirestore();
        }
        
        async function saveToFirestore() {
    if (state.isSaving) throw new Error('Sedang menyimpan, harap tunggu');
    state.isSaving = true;
    const docRef = db.collection('shared').doc('data');
    try {
        // 🛡️ Potong array transaksi agar dokumen tidak melebihi 1MB
        state.appData.frozen.transactions = state.appData.frozen.transactions.slice(0, CONFIG.maxTransactions);
        state.appData.chiller.transactions = state.appData.chiller.transactions.slice(0, CONFIG.maxTransactions);
        
        await db.runTransaction(async (transaction) => {
            await transaction.get(docRef);
            transaction.set(docRef, {
                frozen: state.appData.frozen,
                chiller: state.appData.chiller,
                lastSync: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        });
        
        // ✅ FIX: Setelah berhasil simpan, biarkan onSnapshot yang update state
        // Jangan langsung render, tunggu sync dari Firestore
        return true;
    } catch (err) {
        console.error('❌ Transaction failed:', err);
        // ✅ FIX: Jangan rollback manual, biarkan Firestore handle
        if (err.code === 'aborted') {
            showToast('⚠️ Data sedang diubah user lain. Refresh halaman.', 'critical');
        }
        throw err;
    } finally {
        state.isSaving = false;
    }
}
        
        // ✅ Fixed: Proper basket-section sync with error handling
        function syncBasketsWithSections(area) {
            const sections = state.appData[area].sections;
            const baskets = state.appData[area].baskets;
            const validNumbers = new Set();
            
            // Collect all valid basket numbers from sections
            for (const section of Object.values(sections)) {
                for (const slots of Object.values(section)) {
                    slots.forEach(num => { if (num !== null) validNumbers.add(num); });
                }
            }
            
            // Remove orphaned baskets
            for (const num of Object.keys(baskets)) {
                if (!validNumbers.has(Number(num))) {
                    delete baskets[num];
                }
            }
            
            // Update basket metadata from sections
            for (const [sectionName, barisObj] of Object.entries(sections)) {
                for (const [barisName, slots] of Object.entries(barisObj)) {
                    slots.forEach((basketNum, slotIdx) => {
                        if (basketNum === null) return;
                        
                        if (!baskets[basketNum]) {
                            baskets[basketNum] = {
                                section: sectionName,
                                baris: barisName,
                                slot: slotIdx + 1,
                                items: []
                            };
                        } else {
                            // Update location if changed
                            baskets[basketNum].section = sectionName;
                            baskets[basketNum].baris = barisName;
                            baskets[basketNum].slot = slotIdx + 1;
                        }
                    });
                }
            }
        }
        
        // ==================== DATA HELPERS ====================
        function getDefaultSections(area) {
            const frozen = {
                'IMP': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null], D:[null,null,null,null,null], E:[null,null,null,null,null] },
                'RTL': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] },
                'NPL': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] },
                'RDQ': { A:[null,null,null,null,null] },
                'MTPP': { A:[null,null,null,null,null], B:[null,null,null,null,null] },
                'MI': { A:[null,null,null,null,null], B:[null,null,null,null,null], C:[null,null,null,null,null] }
            };
            const chiller = {
                'IMP': { A:[null,null,null,null,null] },
                'RTL': { A:[null,null,null,null,null] },
                'NPL': { A:[null,null,null,null,null] },
                'MTPP': { A:[null,null,null,null,null] },
                'RDQ': { A:[null,null,null,null,null] },
                'MI': { A:[null,null,null,null,null] },
                'THAWING': { A:[null,null,null,null,null], B:[null,null,null,null,null] }
            };
            return area === 'frozen' ? Utils.safeJsonParse(JSON.stringify(frozen), frozen) 
                                    : Utils.safeJsonParse(JSON.stringify(chiller), chiller);
        }
        
        function convertSectionsToSlotFormat(sections) {
            const result = {};
            for (const [sectionName, barisObj] of Object.entries(sections || {})) {
                result[sectionName] = {};
                for (const [barisName, value] of Object.entries(barisObj || {})) {
                    // Convert legacy array format to 5-slot array
                    if (Array.isArray(value) && value.length === 5 && value.every(x => x === null || typeof x === 'number')) {
                        result[sectionName][barisName] = value;
                    } else {
                        result[sectionName][barisName] = upgradeBarisToSlots(value);
                    }
                }
            }
            return result;
        }
        
        function upgradeBarisToSlots(baris) {
            if (!Array.isArray(baris)) return [null, null, null, null, null];
            const slots = [null, null, null, null, null];
            baris.forEach((num, idx) => {
                if (idx < 5 && num !== null && num !== undefined) {
                    slots[idx] = num;
                }
            });
            return slots;
        }
        
        function currentSections() { return state.appData[state.currentArea].sections; }
        function currentBaskets() { return state.appData[state.currentArea].baskets; }
        function currentTransactions() { return state.appData[state.currentArea].transactions; }
        
        function getBasketCapacity(basketNum) {
            const items = currentBaskets()[basketNum]?.items || [];
            if (items.length === 0) return CONFIG.basketCapacity.DEFAULT;
            return items.some(i => i.jenis === 'TH') 
                ? CONFIG.basketCapacity.MIXED_WITH_TH 
                : CONFIG.basketCapacity.DEFAULT;
        }
        
        function isBasketFull(basketNum) {
            return (currentBaskets()[basketNum]?.items || []).length >= getBasketCapacity(basketNum);
        }
        
        function itemCount(basketNum) {
            return (currentBaskets()[basketNum]?.items || []).length;
        }
        
        // ✅ FEFO check - now returns boolean AND shows blocking UI
        function cekFEFO(basketNum, itemIdx, showUI = true) {
            const items = currentBaskets()[basketNum]?.items || [];
            const selectedItem = items[itemIdx];
            if (!selectedItem?.expDate) return true;
            
            const selectedExp = Utils.parseDate(selectedItem.expDate)?.getTime();
            const now = Date.now();
            
            // Find items that expire earlier AND are not yet expired
            const earlierExpiring = items
                .filter((it, i) => i !== itemIdx && it.expDate)
                .filter(it => {
                    const expTime = Utils.parseDate(it.expDate)?.getTime();
                    return expTime < selectedExp && expTime > now;
                })
                .sort((a, b) => Utils.parseDate(a.expDate) - Utils.parseDate(b.expDate));
            
            if (earlierExpiring.length > 0) {
                const first = earlierExpiring[0];
                const msg = `⚠️ FEFO: "${first.nama}" expired ${new Date(first.expDate).toLocaleDateString('id-ID')} lebih dulu!`;
                if (showUI) showToast(msg, 'critical');
                return false;
            }
            return true;
        }
        
        function logTransaction(type, detail) {
    const txns = currentTransactions();
    txns.unshift({
        id: Utils.uid(),
        timestamp: new Date().toISOString(),
        type,
        detail: { ...detail },
        user: auth.currentUser?.email || 'unknown'
    });
    if (txns.length > CONFIG.maxTransactions) {
        txns.pop();
    }
}

    if (!DOM.toast) {

    clearTimeout(toastTimer); // ⬅️ Cegah notifikasi terhapus prematur

    DOM.toast.classList.add('show');

    DOM.toast.textContent = message;

    const duration = type === 'critical' ? CONFIG.toastDuration.critical : CONFIG.toastDuration.normal;
    toastTimer = setTimeout(() => {

}

        function buildBasketSlot(basketNum, slotIdx) {
            if (basketNum === null) {

            }
            
            const basket = currentBaskets()[basketNum];
            const items = basket?.items || [];
            const count = items.length;
            const capacity = getBasketCapacity(basketNum);
            const now = new Date();
            
            // Status flags
            const isFull = count >= capacity;
            const hasExpired = items.some(i => i.expDate && Utils.isDateExpired(i.expDate));
            const hasEstLewat = items.some(i => i.estOutDate && Utils.isDateExpired(i.estOutDate));
            const hasRetain = items.some(i => i.isRetainSample);
            
            // CSS classes
            let classes = 'basket-slot';
            if (hasExpired || hasEstLewat) classes += ' red';
            else if (isFull) classes += ' yellow';
            else if (count > 0) classes += ' green';
            else classes += ' slot-empty';
            
            // Status icons (top-right)
            const icons = [];
            if (isFull) icons.push('<span class="status-icon full" title="Penuh" aria-label="Penuh"><i class="fas fa-ban"></i></span>');
            if (hasExpired) icons.push('<span class="status-icon expired" title="EXPIRED" aria-label="Expired"><i class="fas fa-skull"></i></span>');
            if (hasEstLewat) icons.push('<span class="status-icon est-lewat" title="Estimasi lewat" aria-label="Estimasi lewat"><i class="fas fa-hourglass-end"></i></span>');
            const statusIcons = icons.length ? `<div class="slot-status-icons" aria-hidden="true">${icons.join('')}</div>` : '';
            
            // Tooltip
            const tips = [`Keranjang ${basketNum} — ${count}/${capacity}`];
            if (isFull) tips.push('🚫 PENUH');
            if (hasExpired) tips.push('☠️ EXPIRED');
            if (hasEstLewat) tips.push('⏳ EST LEWAT');
            if (hasRetain) tips.push('🧪 RETAIN');
            
            // ✅ FIXED: Basket number badge - LEFT position with background
            const basketNumBadge = `<span class="basket-num-badge" aria-label="Nomor keranjang ${basketNum}">${basketNum}</span>`;
            const slotCount = `<span class="slot-count">${count}/${capacity}</span>`;
            
            return `
                <div class="${classes}" 
                     onclick="App.showBasketDetail(${basketNum})" 
                     title="${Utils.escapeHtml(tips.join(' | '))}"
                     role="button"
                     tabindex="0"
                     aria-label="Keranjang ${basketNum}, ${count} dari ${capacity} item"
                     data-basket="${basketNum}">
                    ${basketNumBadge}
                    ${statusIcons}
                    ${slotCount}
                </div>
            `;
        }
        
        function buildBarisBox(sectionName, barisName, slots) {
            const barisLabels = ['A', 'B', 'C', 'D', 'E'];
            const barisIndex = barisLabels.indexOf(barisName) + 1;
            const paddedIndex = String(barisIndex).padStart(2, '0');
            // ✅ FIXED: Full label visible on mobile: "IMP 01" format
            const label = `${sectionName} ${paddedIndex}`;
            
            let slotsHtml = '';
            for (let i = 0; i < 5; i++) {
                slotsHtml += buildBasketSlot(slots[i], i);
            }
            
            return `
                <div class="baris-box">
                    <div class="baris-box-lbl" title="${Utils.escapeHtml(label)}">${Utils.escapeHtml(label)}</div>
                    <div class="baris-slots" role="grid" aria-label="Baris ${label}">${slotsHtml}</div>
                </div>
            `;
        }
        
        function getSingleBarisBox(sectionName, barisName) {
            const sections = currentSections();
            const slots = sections[sectionName]?.[barisName] || [null, null, null, null, null];
            return buildBarisBox(sectionName, barisName, slots);
        }
        
        function getSectionBoxes(sectionName) {
            const section = currentSections()[sectionName] || {};
            return Object.keys(section)
                .sort()
                .map(barisName => buildBarisBox(sectionName, barisName, section[barisName]))
                .join('');
        }
        
        function getAreaStats() {
            const baskets = currentBaskets();
            let totalItems = 0, totalExpired = 0, totalEstLewat = 0, totalPenuh = 0, totalRetain = 0;
            
            for (const [basketNum, basket] of Object.entries(baskets)) {
                const items = basket.items || [];
                totalItems += items.length;
                
                if (items.length >= getBasketCapacity(basketNum)) totalPenuh++;
                
                for (const item of items) {
                    if (item.isRetainSample) { totalRetain++; continue; }
                    if (item.expDate && Utils.isDateExpired(item.expDate)) totalExpired++;
                    if (item.estOutDate && Utils.isDateExpired(item.estOutDate)) totalEstLewat++;
                }
            }
            
            return { totalItems, totalExpired, totalEstLewat, totalPenuh, totalRetain };
        }

        function validateQuickEstOut() {
            const expDate = document.getElementById('inExpDate')?.value;
            const estOut = document.getElementById('inEstOutDate')?.value;
            const estInput = document.getElementById('inEstOutDate');
            const warning = document.getElementById('estOutWarning');
            
            if (!expDate || !estOut || !warning) return;
            
            const expD = Utils.parseDate(expDate);
            const estD = Utils.parseDate(estOut);
            
            if (!expD || !estD) return;
            
            if (estD > expD) {
                warning.innerHTML = '<i class="fas fa-exclamation-triangle" aria-hidden="true"></i> ❌ Tidak boleh lebih dari Tanggal Exp!';
                warning.style.color = 'var(--danger)';
                estInput?.classList.add('input-warning');
                estInput?.classList.remove('input-success');
            } else if (estD.getTime() === expD.getTime()) {
                warning.innerHTML = '<i class="fas fa-info-circle" aria-hidden="true"></i> ⚠️ Estimasi sama dengan Exp';
                warning.style.color = 'var(--warning)';
                estInput?.classList.add('input-success');
                estInput?.classList.remove('input-warning');
            } else {
                warning.innerHTML = '<i class="fas fa-check-circle" aria-hidden="true"></i> ✅ Valid';
                warning.style.color = 'var(--success)';
                estInput?.classList.add('input-success');
                estInput?.classList.remove('input-warning');
            }
        }

        function updateMoveSectionByArea() {
            const area = document.getElementById('moveArea')?.value;
            const sectionSelect = document.getElementById('moveSection');
            if (!sectionSelect || !area) return;
            
            // ✅ FIXED: Format "MTPP 01" style options
            sectionSelect.innerHTML = '<option value="">-- Pilih Section --</option>';
            const sections = state.appData[area].sections;
            
            Object.keys(sections).forEach(sectionName => {
                const value = `${area}:${sectionName}`;
                sectionSelect.innerHTML += `<option value="${Utils.escapeHtml(value)}">${area==='frozen'?'❄️':'🌡️'} ${Utils.escapeHtml(sectionName)}</option>`;
            });
            
            if (Object.keys(sections).length > 0) {
                // Auto-select first and trigger baris update
                const firstKey = Object.keys(sections)[0];
                sectionSelect.value = `${area}:${firstKey}`;
                updateMoveBaris();
            }
        }
        
        function updateMoveBaris() {
            const areaSelect = document.getElementById('moveArea');
            const sectionSelect = document.getElementById('moveSection');
            const barisSelect = document.getElementById('moveBaris');
            
            if (!barisSelect) return;
            barisSelect.innerHTML = '<option value="">-- Pilih Baris --</option>';
            
            const area = areaSelect?.value || 'frozen';
            const fullSection = sectionSelect?.value;
            if (!fullSection) return;
            
            const [selectedArea, sectionName] = fullSection.split(':');
            const barisObj = state.appData[selectedArea].sections[sectionName] || {};
            
            // ✅ FIXED: Show "MTPP 01" format for baris options
            Object.keys(barisObj).sort().forEach((barisName, idx) => {
                const paddedIdx = String(idx + 1).padStart(2, '0');
                const label = `${sectionName} ${paddedIdx}`;
                barisSelect.innerHTML += `<option value="${Utils.escapeHtml(barisName)}">${Utils.escapeHtml(label)}</option>`;
            });
            
            updateMoveKeranjang();
        }
        
        function updateMoveKeranjang() {
            const areaSelect = document.getElementById('moveArea');
            const sectionSelect = document.getElementById('moveSection');
            const barisSelect = document.getElementById('moveBaris');
            const basketSelect = document.getElementById('moveKeranjang');
            
            if (!basketSelect) return;
            basketSelect.innerHTML = '<option value="">-- Pilih Keranjang --</option>';
            
            const area = areaSelect?.value || 'frozen';
            const fullSection = sectionSelect?.value;
            const barisName = barisSelect?.value;
            
            if (!fullSection || !barisName) return;
            
            const [selectedArea, sectionName] = fullSection.split(':');
            const slots = state.appData[selectedArea].sections[sectionName]?.[barisName];
            if (!slots) return;
            
            slots.forEach((basketNum, slotIdx) => {
                if (basketNum === null) return;
                
                const count = itemCount(basketNum);
                const capacity = getBasketCapacity(basketNum);
                const isFull = count >= capacity;
                const disabled = isFull ? 'disabled' : '';
                const status = isFull ? ' - PENUH' : '';
                
                basketSelect.innerHTML += `
                    <option value="${basketNum}" ${disabled}>
                        Krj ${basketNum} (${count}/${capacity})${status}
                    </option>
                `;
            });
        }
        
        async function pindahkanItem(fromBasketNum, itemIdx) {
            const fromArea = state.currentArea;
            const fromBasket = state.appData[fromArea].baskets[fromBasketNum];
            if (!fromBasket?.items[itemIdx]) return;
            
            const item = fromBasket.items[itemIdx];
            
            // ✅ FEFO check - BLOCKING
            if (item.expDate && !cekFEFO(fromBasketNum, itemIdx, true)) {
                return; // User saw warning, don't proceed
            }
            
            const targetArea = document.getElementById('moveArea')?.value || 'frozen';
            const fullSection = document.getElementById('moveSection')?.value;
            const targetBaris = document.getElementById('moveBaris')?.value;
            let targetBasketNum = parseInt(document.getElementById('moveKeranjang')?.value);
            const newBasketInput = document.getElementById('moveKeranjangBaru')?.value;
            
            if (!fullSection || !targetBaris) {
                return showToast('Pilih Section dan Baris tujuan.', 'critical');
            }
            const [sectionArea, targetSection] = fullSection.split(':');
            
            // Handle new basket number
            if (!targetBasketNum && newBasketInput) {
                targetBasketNum = parseInt(newBasketInput);
                if (!targetBasketNum || targetBasketNum <= 0) {
                    return showToast('Masukkan nomor keranjang yang valid.', 'critical');
                }
                
                // Check uniqueness across both areas
                for (const area of ['frozen', 'chiller']) {
                    for (const [secName, barisObj] of Object.entries(state.appData[area].sections)) {
                        for (const slots of Object.values(barisObj)) {
                            if (slots.includes(targetBasketNum)) {
                                return showToast(`❌ Nomor ${targetBasketNum} sudah digunakan di ${area} ${secName}.`, 'critical');
                            }
                        }
                    }
                }
                
                // Assign to first empty slot in target location
                const targetSlots = state.appData[sectionArea].sections[targetSection]?.[targetBaris];
                if (targetSlots) {
                    const emptyIdx = targetSlots.findIndex(s => s === null);
                    if (emptyIdx !== -1) {
                        targetSlots[emptyIdx] = targetBasketNum;
                    }
                }
            }
            
            if (!targetBasketNum) {
                return showToast('Pilih keranjang tujuan atau buat nomor baru.', 'critical');
            }
            
            if (targetBasketNum === fromBasketNum && sectionArea === fromArea) {
                return showToast('Tidak bisa pindah ke keranjang yang sama.', 'critical');
            }
            
            const targetBasket = state.appData[sectionArea].baskets[targetBasketNum];
            if (targetBasket && isBasketFull(targetBasketNum)) {
                return showToast('Keranjang tujuan penuh.', 'critical');
            }
            
            // Execute move
            const currentUser = auth.currentUser?.email || 'unknown';
            
            // Add to move history
            item.moveHistory = item.moveHistory || [];
            item.moveHistory.push({
                from: `Keranjang ${fromBasketNum} (${fromArea.toUpperCase()})`,
                to: `Keranjang ${targetBasketNum} (${sectionArea.toUpperCase()})`,
                timestamp: new Date().toISOString(),
                user: currentUser
            });
            
            // Remove from source
            fromBasket.items.splice(itemIdx, 1);
            if (fromBasket.items.length === 0) {
                removeEmptyBasketNumber(fromBasketNum, fromArea);
            }
            
            // Add to target
            if (!state.appData[sectionArea].baskets[targetBasketNum]) {
                state.appData[sectionArea].baskets[targetBasketNum] = {
                    section: targetSection,
                    baris: targetBaris,
                    items: []
                };
            }
            state.appData[sectionArea].baskets[targetBasketNum].items.push(item);
            
            // Switch area view if needed
            if (sectionArea !== state.currentArea) {
                state.currentArea = sectionArea;
                DOM.areaSelect.value = sectionArea;
                DOM.areaTitle.textContent = sectionArea === 'frozen' ? 'Frozen' : 'Chiller';
            }
            
            logTransaction('move', {
                nama: item.nama,
                qty: item.qty,
                jenis: item.jenis,
                dari: fromBasketNum,
                ke: targetBasketNum,
                section: targetSection,
                areaTujuan: sectionArea
            });
            
            try {
                await saveToFirestore();
                showToast('✅ Barang dipindahkan ke keranjang ' + targetBasketNum);
                showBasketDetail(fromBasketNum); // Show source basket (now without this item)
            } catch {
                // Rollback handled by caller if needed
            }
        }
        
        function removeEmptyBasketNumber(basketNum, areaOverride) {
            const areas = areaOverride ? [areaOverride] : ['frozen', 'chiller'];
            for (const area of areas) {
                const sections = state.appData[area].sections;
                const baskets = state.appData[area].baskets;
                
                for (const [sectionName, barisObj] of Object.entries(sections)) {
                    for (const [barisName, slots] of Object.entries(barisObj)) {
                        const idx = slots.indexOf(basketNum);
                        if (idx !== -1) {
                            slots[idx] = null;
                            if (baskets[basketNum]) {
                                delete baskets[basketNum];
                            }

            if (!basket?.items[itemIdx]) return;
            
            const item = basket.items[itemIdx];
            
            // ✅ FEFO blocking check

        function executePartialOut(basketNum, itemIdx, itemName, totalQty, jenis) {
            const qtyInput = document.getElementById('partialOutQty');
            const qtyOut = parseInt(qtyInput?.value);
            const warning = document.getElementById('partialOutWarning');
            
            if (!qtyOut || qtyOut <= 0) {
                if (warning) warning.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Masukkan jumlah!';
                return;
            }
            if (qtyOut > totalQty) {
                if (warning) warning.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Maksimal ${totalQty}!`;
                return;
            }
            
            const basket = currentBaskets()[basketNum];
            if (!basket?.items[itemIdx]) return;
            
            const sisa = totalQty - qtyOut;
            if (sisa <= 0) {
                // Remove entirely
                executeFullOut(basketNum, itemIdx, basket.items[itemIdx]);
                closePartialOutDialog();
                return;
            }
            
            // Update quantity
            const currentUser = auth.currentUser?.email || 'unknown';
            basket.items[itemIdx].qty = sisa.toString();
            basket.lastModifiedBy = currentUser;
            basket.lastModifiedAt = new Date().toISOString();
            
            logTransaction('out', {
                nama: itemName,
                qty: `${qtyOut} dari ${totalQty} (sisa ${sisa})`,
                jenis,
                keranjang: basketNum,
                section: basket.section,
                partial: true
            });
            
            saveToFirestore().catch(() => {});
            closePartialOutDialog();
            showToast(`✅ ${qtyOut} ${itemName} dikeluarkan. Sisa: ${sisa}`);
            showBasketDetail(basketNum);
        }
        
        async function executeFullOut(basketNum, itemIdx, item) {
            const basket = currentBaskets()[basketNum];
            if (!basket) return;
            
            const currentUser = auth.currentUser?.email || 'unknown';
            basket.items.splice(itemIdx, 1);
            
            if (basket.items.length === 0) {
                removeEmptyBasketNumber(basketNum);
            } else {
                basket.lastModifiedBy = currentUser;
                basket.lastModifiedAt = new Date().toISOString();
            }
            
            logTransaction('out', {
                nama: item.nama,
                qty: item.qty,
                jenis: item.jenis,
                keranjang: basketNum,
                section: basket.section
            });
            
            try {
                await saveToFirestore();
                showToast(`✅ ${item.nama} dikeluarkan`);
                showBasketDetail(basketNum);
            } catch {
                // Error handled by saveToFirestore
            }
        }

            if (!slotSelect) return;

        async function executeMoveBasket(basketNum) {
            const targetSection = document.getElementById('moveBasketSection')?.value;
            const targetBaris = document.getElementById('moveBasketBaris')?.value;
            const targetSlot = parseInt(document.getElementById('moveBasketSlot')?.value);
            
            if (!targetSection || !targetBaris || !targetSlot) {
                return showToast('Lengkapi Section, Baris, dan Slot tujuan!', 'critical');
            }
            
            const basket = currentBaskets()[basketNum];
            if (!basket) return;
            
            // Check if same location
            if (basket.section === targetSection && basket.baris === targetBaris && basket.slot === targetSlot) {
                return showToast('Lokasi tujuan sama dengan saat ini!', 'critical');
            }
            
            const targetSlots = currentSections()[targetSection]?.[targetBaris];
            if (!targetSlots) return;
            if (targetSlots[targetSlot - 1] !== null) {
                return showToast('Slot tujuan sudah terisi!', 'critical');
            }
            
            // Update source slot to empty
            const fromSection = basket.section;
            const fromBaris = basket.baris;
            const fromSlot = basket.slot;
            const fromSlots = currentSections()[fromSection]?.[fromBaris];
            if (fromSlots) {
                fromSlots[fromSlot - 1] = null;
            }
            
            // Update target slot
            targetSlots[targetSlot - 1] = basketNum;
            
            // Update basket metadata
            basket.section = targetSection;
            basket.baris = targetBaris;
            basket.slot = targetSlot;
            
            logTransaction('move', {
                nama: `[KERANJANG ${basketNum}]`,
                qty: `${basket.items.length} item`,
                jenis: 'KERANJANG',
                dari: `${fromSection} ${fromBaris} Slot ${fromSlot}`,
                ke: `${targetSection} ${targetBaris} Slot ${targetSlot}`,
                keranjang: basketNum,
                section: targetSection
            });
            
            try {
                await saveToFirestore();
                showToast(`✅ Keranjang ${basketNum} dipindahkan!`);
                setTimeout(() => showBasketDetail(basketNum), 500);
            } catch {
                // Error handled
            }
        }

        function handleSlotChange() {
            const slot = parseInt(document.getElementById('inSlot')?.value);
            const manualInput = document.getElementById('inKeranjangManual');
            const formGroup = manualInput?.closest('.form-group');
            if (!manualInput) return;

            const existingWarning = document.getElementById('keranjangWarning');
            if (existingWarning) existingWarning.remove();
            manualInput.classList.remove('input-warning', 'input-success');
            
            if (!slot || isNaN(slot)) {
                manualInput.disabled = true;
                manualInput.placeholder = "Pilih slot dulu";
                return;
            }
            
            const section = document.getElementById('inSection')?.value;
            const baris = document.getElementById('inBaris')?.value;
            const slots = currentSections()[section]?.[baris];
            if (!slots) return;
            
            const basketNum = slots[slot - 1];
            if (basketNum !== null && basketNum !== undefined) {
                // Slot already has a basket
                manualInput.disabled = true;
                manualInput.value = '';
                manualInput.placeholder = `Menggunakan keranjang ${basketNum}`;
                manualInput.classList.add('input-success');
                
                const count = itemCount(basketNum);
                const cap = getBasketCapacity(basketNum);

            } else {
                // Empty slot - need new basket number
                manualInput.disabled = false;
                manualInput.placeholder = "⚠️ Masukkan nomor keranjang baru (wajib)";

                manualInput.focus();

        function validateKeranjangNumber(value) {
            const input = document.getElementById('inKeranjangManual');
            const formGroup = input?.closest('.form-group');
            const warning = document.getElementById('keranjangWarning');
            if (warning) warning.remove();
            
            if (!value || isNaN(parseInt(value)) || parseInt(value) <= 0) {
                input?.classList.add('input-warning');
                input?.classList.remove('input-success');
                return;
            }
            
            const num = parseInt(value);
            let found = null;
            
            // Check across both areas
            for (const area of ['frozen', 'chiller']) {
                const sections = state.appData[area].sections;
                for (const [secName, barisObj] of Object.entries(sections)) {
                    for (const [barisName, slots] of Object.entries(barisObj)) {
                        if (slots.includes(num)) {
                            const slotIdx = slots.indexOf(num) + 1;
                            found = { area, section: secName, baris: barisName, slot: slotIdx };
                            break;
                        }
                    }
                    if (found) break;
                }
                if (found) break;
            }
            
            if (found) {
                input?.classList.add('input-warning');
                input?.classList.remove('input-success');
                const warn = document.createElement('div');
                warn.id = 'keranjangWarning';
                warn.className = 'warning-message';
                warn.setAttribute('role', 'alert');
                warn.innerHTML = `<i class="fas fa-exclamation-triangle" aria-hidden="true"></i> ❌ Nomor ${num} sudah digunakan di ${found.area==='frozen'?'❄️ Frozen':'🌡️ Chiller'} (${found.section} Baris ${found.baris} Slot ${found.slot})`;
                formGroup?.appendChild(warn);
            } else {
                input?.classList.add('input-success');
                input?.classList.remove('input-warning');
                const success = document.createElement('div');
                success.id = 'keranjangWarning';
                success.className = 'success-message';
                success.setAttribute('role', 'status');
                success.innerHTML = `<i class="fas fa-check-circle" aria-hidden="true"></i> ✅ Nomor ${num} tersedia`;
                formGroup?.appendChild(success);
            }
        }
        
        function validateEstOutDate() {

            const estOut = document.getElementById('inEstOutDate')?.value;
            const estInput = document.getElementById('inEstOutDate');

        async function submitIn(e) {
    e.preventDefault();
    if (state.isSaving) {
        showToast('⏳ Sedang memproses, tunggu sebentar...', 'critical');
        return;
    }

    const nama = document.getElementById('inNama')?.value.trim();
    const qty = document.getElementById('inQty')?.value.trim();
    const jenis = document.getElementById('inJenis')?.value;
    const expDate = document.getElementById('inExpDate')?.value;
    const estOutDate = document.getElementById('inEstOutDate')?.value;
    const section = document.getElementById('inSection')?.value;
    const baris = document.getElementById('inBaris')?.value;
    const slotStr = document.getElementById('inSlot')?.value;
    const manualNum = document.getElementById('inKeranjangManual')?.value.trim();

    if (!nama || !qty || !baris || !slotStr || !expDate || !estOutDate) {
        return showToast('Lengkapi semua field wajib!', 'critical');
    }

    const expD = Utils.parseDate(expDate);
    const estD = Utils.parseDate(estOutDate);
    if (estD > expD) return showToast('❌ Est Keluar tidak boleh > Exp!', 'critical');

    const slotIdx = parseInt(slotStr) - 1;
    const slots = currentSections()[section]?.[baris];
    if (!slots) return showToast('Data baris tidak valid.', 'critical');

    let basketNum = slots[slotIdx];
    if (basketNum === null || basketNum === undefined) {
        if (!manualNum || isNaN(parseInt(manualNum)) || parseInt(manualNum) <= 0) {
            return showToast('❌ Masukkan Nomor Keranjang Baru!', 'critical');
        }
        const newNum = parseInt(manualNum);
        for (const area of ['frozen', 'chiller']) {
            for (const [secName, barisObj] of Object.entries(state.appData[area].sections)) {
                for (const slotArr of Object.values(barisObj)) {
                    if (slotArr.includes(newNum)) {
                        return showToast(`❌ Nomor ${newNum} sudah digunakan di ${area} ${secName}.`, 'critical');
                    }
                }
            }
        }
        slots[slotIdx] = newNum;
        if (!currentBaskets()[newNum]) {
            currentBaskets()[newNum] = { section, baris, slot: slotIdx + 1, items: [] };
        } else {
            currentBaskets()[newNum].section = section;
            currentBaskets()[newNum].baris = baris;
            currentBaskets()[newNum].slot = slotIdx + 1;
        }
        basketNum = newNum;
    } else {
        if (isBasketFull(basketNum)) {
            return showToast(`❌ Keranjang ${basketNum} penuh!`, 'critical');
        }
    }

    if (!currentBaskets()[basketNum]) {
        currentBaskets()[basketNum] = { section, baris, slot: slotIdx + 1, items: [] };
    }

    const currentUser = auth.currentUser?.email || 'unknown';
    const newItem = {
        nama: Utils.escapeHtml(nama),
        qty: Utils.escapeHtml(qty),
        jenis,
        tglMasuk: new Date().toISOString(),
        addedBy: currentUser
    };
    if (expDate) newItem.expDate = expDate;
    if (estOutDate) newItem.estOutDate = estOutDate;

    currentBaskets()[basketNum].items.push(newItem);
    currentBaskets()[basketNum].lastModifiedBy = currentUser;
    currentBaskets()[basketNum].lastModifiedAt = new Date().toISOString();

     try {
        await saveToFirestore();
        
        // ✅ Log HANYA setelah berhasil disimpan
        logTransaction('in', {
            nama, qty, jenis, keranjang: basketNum,
            section, baris, expDate, estOutDate, addedBy: currentUser
        });

        showToast(`✅ ${nama} berhasil masuk ke keranjang ${basketNum}`); // ⬅️ Pesan lebih jelas
        setTimeout(() => {
            renderInputForm();
        }, 1500);
    } catch (err) {
        console.error('❌ Save to Firestore failed:', err);
        showToast('❌ Gagal menyimpan. Periksa koneksi atau izin Firebase.', 'critical');
        setTimeout(() => renderCurrentTab(), 2000);
    }
}
